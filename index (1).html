    function getWeekendDates() {
      const now = new Date();
      const day = now.getDay();
      const diffToSat = day === 6 ? 0 : (6 - day + 7) % 7 || 7;
      const sat = new Date(now);
      sat.setDate(now.getDate() + diffToSat);
      const sun = new Date(sat);
      sun.setDate(sat.getDate() + 1);
      const fmt = (d) => d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
      const key = `${sat.getFullYear()}-${sat.getMonth()}-${sat.getDate()}`;
      return { sat: fmt(sat), sun: fmt(sun), key };
    }

    function chunkEvenly(arr) {
      if (!arr.length) return [];
      const n = arr.length;
      const numGroups = Math.ceil(n / 4);
      const base = Math.floor(n / numGroups);
      const remainder = n % numGroups;
      const groups = [];
      let idx = 0;
      for (let g = 0; g < numGroups; g++) {
        const size = base + (g < remainder ? 1 : 0);
        groups.push(arr.slice(idx, idx + size));
        idx += size;
      }
      return groups;
    }

    function compressImage(file, maxW = 800) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const canvas = document.createElement("canvas");
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.65));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // Supabase data helpers — single row per key in "store" table
    async function dbGet(key) {
      const { data } = await sb.from("store").select("value").eq("key", key).single();
      return data ? data.value : null;
    }
    async function dbSet(key, value) {
      await sb.from("store").upsert({ key, value }, { onConflict: "key" });
    }
    function dbListen(key, cb) {
      const ch = sb.channel("store-" + key)
        .on("postgres_changes", { event: "*", schema: "public", table: "store", filter: `key=eq.${key}` },
          payload => cb(payload.new?.value ?? null))
        .subscribe();
      return () => sb.removeChannel(ch);
    }

        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {

        title:    { fontSize:22, fontWeight:"bold", letterSpacing:1.5, color:"#f0ead6", margin:"10px 0 2px" },
        titleSub: { fontSize:10, color:"#d4af37", letterSpacing:3, textTransform:"uppercase" },
        rule:     { width:80, height:1, background:"linear-gradient(90deg,transparent,#d4af37,transparent)", margin:"10px auto 0" },
        navWrap:  { background:"rgba(0,0,0,.35)", borderBottom:"1px solid rgba(212,175,55,.2)" },
        navRow:   { display:"flex" },
        navBtn:   (a,last) => ({ flex:1, padding:"10px 4px", background:"none", border:"none", borderBottom:a?"2px solid #d4af37":"2px solid transparent", borderRight:last?"none":"1px solid rgba(255,255,255,.04)", color:a?"#d4af37":"rgba(240,234,214,.45)", fontFamily:"Georgia,serif", fontSize:11, letterSpacing:.8, textTransform:"uppercase", cursor:"pointer", lineHeight:1.2 }),
        navDiv:   { height:1, background:"rgba(212,175,55,.12)" },
        body:     { padding:"16px 14px" },
        weekRow:  { display:"flex", gap:8, marginBottom:16, justifyContent:"center" },
        dayTag:   { background:"rgba(212,175,55,.1)", border:"1px solid rgba(212,175,55,.3)", borderRadius:6, padding:"7px 16px", fontSize:12, color:"#d4af37", letterSpacing:1, textTransform:"uppercase" },
        row:      { display:"flex", alignItems:"center", padding:"11px 14px", marginBottom:6, background:"rgba(255,255,255,.03)", borderRadius:8, border:"1px solid rgba(255,255,255,.06)" },
        name:     { flex:1, fontSize:15, letterSpacing:.3 },
        btn:      (a,f) => ({ width:50, height:30, borderRadius:5, border:`1px solid ${a?"#d4af37":"rgba(255,255,255,.12)"}`, background:f?"rgba(212,175,55,.55)":a?"rgba(212,175,55,.22)":"rgba(0,0,0,.35)", color:a?"#d4af37":"rgba(240,234,214,.28)", fontSize:10, fontWeight:"bold", letterSpacing:1, cursor:"pointer", transition:"all .15s" }),
        tGrid:    { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 },
        tBox:     { background:"rgba(0,0,0,.3)", borderRadius:10, padding:"14px 12px", border:"1px solid rgba(212,175,55,.18)" },
        tH:       { fontSize:10, letterSpacing:2, color:"#d4af37", textTransform:"uppercase", marginBottom:8 },
        tN:       { fontSize:30, fontWeight:"bold", color:"#d4af37", lineHeight:1, marginBottom:8 },
        tItem:    { display:"block", fontSize:13, padding:"5px 0", color:"#f0ead6", borderBottom:"1px solid rgba(255,255,255,.04)" },
        dSec:     { marginBottom:24 },
        dTitle:   { fontSize:11, letterSpacing:2, color:"#d4af37", textTransform:"uppercase", marginBottom:12, paddingBottom:6, borderBottom:"1px solid rgba(212,175,55,.2)" },
        gCard:    (ci) => ({ background:"rgba(0,0,0,.22)", borderRadius:10, padding:"14px 16px", marginBottom:10, border:`1px solid ${GROUP_COLORS[ci%6]}2a`, borderLeft:`3px solid ${GROUP_COLORS[ci%6]}` }),
        gTitle:   (ci) => ({ fontSize:11, letterSpacing:2, color:GROUP_COLORS[ci%6], textTransform:"uppercase", marginBottom:10, fontWeight:"bold", display:"flex", alignItems:"center", gap:8 }),
        forming:  { fontSize:9, letterSpacing:1, color:"rgba(240,234,214,.35)", background:"rgba(255,255,255,.05)", borderRadius:4, padding:"2px 8px", textTransform:"uppercase" },
        slot:     (f) => ({ display:"flex", alignItems:"center", gap:8, padding:"7px 0", borderBottom:"1px solid rgba(255,255,255,.04)", color:f?"#f0ead6":"rgba(240,234,214,.2)", fontSize:14 }),
        dot:      (f,ci) => ({ width:7, height:7, borderRadius:"50%", background:f?GROUP_COLORS[ci%6]:"rgba(255,255,255,.1)", flexShrink:0 }),
        label:    { fontSize:10, letterSpacing:2, color:"#d4af37", textTransform:"uppercase", marginBottom:10, marginTop:18 },
        input:    { background:"rgba(255,255,255,.06)", border:"1px solid rgba(212,175,55,.22)", borderRadius:7, padding:"10px 14px", color:"#f0ead6", fontFamily:"Georgia,serif", fontSize:15, width:"100%", boxSizing:"border-box", outline:"none" },
        addBtn:   { marginTop:8, width:"100%", padding:10, background:"rgba(212,175,55,.12)", border:"1px solid rgba(212,175,55,.28)", borderRadius:7, color:"#d4af37", fontFamily:"Georgia,serif", fontSize:14, cursor:"pointer" },
        aRow:     { display:"flex", alignItems:"center", padding:"9px 12px", marginBottom:6, background:"rgba(255,255,255,.04)", borderRadius:7, gap:8 },
        icon:     (c) => ({ background:"none", border:"none", color:c||"rgba(240,234,214,.35)", cursor:"pointer", fontSize:16, padding:"2px 5px" }),
        upBox:    { background:"rgba(0,0,0,.22)", border:"1px dashed rgba(212,175,55,.3)", borderRadius:10, padding:"18px 16px", marginBottom:16, textAlign:"center" },
        pGrid:    { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 },
        pCard:    { background:"rgba(0,0,0,.28)", borderRadius:8, overflow:"hidden", border:"1px solid rgba(255,255,255,.06)", cursor:"pointer" },
        pImg:     { width:"100%", aspectRatio:"1", objectFit:"cover", display:"block" },
        lockBox:  { textAlign:"center", padding:"40px 20px" },
        lbOv:     { position:"fixed", inset:0, background:"rgba(0,0,0,.94)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:1000, padding:20 },
        lbImg:    { maxWidth:"100%", maxHeight:"68vh", borderRadius:8, objectFit:"contain" },
        lbClose:  { position:"absolute", top:20, right:20, background:"none", border:"none", color:"#d4af37", fontSize:28, cursor:"pointer" },
      };

      function PhotoWall({ wallPhotos, wallKey, uploaderVal, setUploaderVal, captionVal, setCaptionVal, fileInputRef, accent, showTagline=true, multi=false }) {
        const capRef = useRef(null);
        async function handleUpload(files) {
          const cap = capRef.current?.value || "";
          if (capRef.current) capRef.current.value = "";
          for (const file of Array.from(files)) {
            await uploadPhoto(file, wallKey, "", cap);
          }
        }
        return (
          <>
            <div style={C.upBox}>
              <div style={{fontSize:24,marginBottom:6}}>📸</div>
              {showTagline&&<div style={{fontSize:12,color:"rgba(240,234,214,.45)",marginBottom:12}}>Post anything — course shots, celebrations, whatever</div>}
              <input ref={capRef} style={{...C.input,marginBottom:10}} placeholder="Caption (optional)"/>
              <input ref={fileInputRef} type="file" accept="image/*" multiple={multi} style={{display:"none"}} onChange={e=>{handleUpload(e.target.files);if(fileInputRef.current)fileInputRef.current.value="";}}/>
              <button style={{...C.addBtn,marginTop:0}} onClick={()=>fileInputRef.current?.click()} disabled={uploading}>{uploading?"Uploading...":multi?"📷 Choose Photos":"📷 Choose Photo"}</button>
            </div>
            {wallPhotos.length===0
              ? <div style={{textAlign:"center",color:"rgba(240,234,214,.3)",fontSize:14,fontStyle:"italic",marginTop:20}}>No pics yet — be the first</div>
              : <div style={C.pGrid}>{wallPhotos.map(p=>(
                  <div key={p.id} style={C.pCard} onClick={()=>setLightbox({...p,wall:wallKey})}>
                    <img src={p.dataUrl} alt="" style={C.pImg}/>
                    <div style={{padding:"8px 10px"}}>
                      {p.uploader&&<div style={{fontSize:12,color:accent||"#d4af37",letterSpacing:.5}}>{p.uploader}</div>}
                      {p.caption&&<div style={{fontSize:13,color:"rgba(240,234,214,.8)",marginTop:2}}>{p.caption}</div>}
                      <div style={{fontSize:10,color:"rgba(240,234,214,.3)",marginTop:4}}>{p.ts}</div>
                    </div>
                  </div>
                ))}</div>
            }
          </>
        );
      }

      function renderGroups(groups, dayLabel) {
        if (!groups.length) return <div style={{color:"rgba(240,234,214,.3)",fontSize:13,fontStyle:"italic",textAlign:"center",padding:"20px 0"}}>No signups yet for {dayLabel}</div>;
        return groups.map((group,gi)=>{
          const slots=[...group,...Array(4-group.length).fill(null)];
          return (
            <div key={gi} style={C.gCard(gi)}>
              <div style={C.gTitle(gi)}>Rando {gi+1} {group.length<4&&<span style={C.forming}>Forming...</span>}</div>
              {slots.map((p,si)=><div key={si} style={C.slot(!!p)}><div style={C.dot(!!p,gi)}/>{p||"—"}</div>)}
            </div>
          );
        });
      }

      if (loading) return (
        <div style={{...C.app,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{color:"#d4af37",letterSpacing:2,fontSize:13}}>LOADING...</div>
        </div>
      );

      return (
        <div style={C.app}>
          {lightbox&&(
            <div style={C.lbOv} onClick={()=>setLightbox(null)}>
              <button style={C.lbClose} onClick={()=>setLightbox(null)}>✕</button>
              <img src={lightbox.dataUrl} alt="" style={C.lbImg} onClick={e=>e.stopPropagation()}/>
              {lightbox.caption&&<div style={{marginTop:14,textAlign:"center",fontSize:15}}>{lightbox.caption}</div>}
              <div style={{marginTop:6,fontSize:12,color:"rgba(240,234,214,.4)"}}>{lightbox.uploader} · {lightbox.ts}</div>
              {adminUnlocked&&<button style={{...C.addBtn,marginTop:16,color:"#e05c5c",borderColor:"rgba(224,92,92,.35)",width:"auto",padding:"8px 24px"}} onClick={()=>deletePhoto(lightbox.id,lightbox.wall)}>Delete Photo</button>}
            </div>
          )}

          <div style={C.header}>
            <div style={{display:"flex",justifyContent:"center"}}><GolfBallLogo size={64}/></div>
            <div style={C.title}>MCC Weekend Golf</div>
            <div style={C.titleSub}>Manor Country Club</div>
            <div style={C.rule}/>
          </div>

          <div style={C.navWrap}>
            <div style={C.navRow}>{ROW1.map(([v,l],i)=><button key={v} style={C.navBtn(view===v,i===ROW1.length-1)} onClick={()=>setView(v)}>{l}</button>)}</div>
            <div style={C.navDiv}/>
            <div style={C.navRow}>{ROW2.map(([v,l],i)=><button key={v} style={C.navBtn(view===v,i===ROW2.length-1)} onClick={()=>setView(v)}>{l}</button>)}</div>
          </div>

          <div style={C.body}>
            {view==="signup"&&<>
              <div style={C.weekRow}>
                <div style={{...C.dayTag, textAlign:"center"}}>
                  <div>SAT · {sat}</div>
                  {weather&&<div style={{fontSize:11,color:"rgba(240,234,214,.6)",marginTop:3,letterSpacing:.5}}>{weather.sat.icon} {weather.sat.hi}° · {weather.sat.rain}%</div>}
                </div>
                <div style={{...C.dayTag, textAlign:"center"}}>
                  <div>SUN · {sun}</div>
                  {weather&&<div style={{fontSize:11,color:"rgba(240,234,214,.6)",marginTop:3,letterSpacing:.5}}>{weather.sun.icon} {weather.sun.hi}° · {weather.sun.rain}%</div>}
                </div>
              </div>
              {players.map(name=>{
                const sg=signups[name]||{};
                return (
                  <div key={name} style={C.row}>
                    <div style={C.name}>{name}</div>
                    <div style={{display:"flex",gap:8}}>
                      {["sat","sun"].map(day=><button key={day} style={C.btn(sg[day],flash===name+day)} onClick={()=>toggle(name,day)}>{day.toUpperCase()}</button>)}
                    </div>
                  </div>
                );
              })}
              <div style={{marginTop:16,background:"rgba(255,255,255,.03)",borderRadius:8,border:"1px solid rgba(212,175,55,.15)",padding:"12px 14px"}}>
                <div style={{fontSize:10,letterSpacing:2,color:"rgba(212,175,55,.6)",textTransform:"uppercase",marginBottom:10}}>Guest / Other</div>
                <GuestRow signups={signups} onToggle={toggle} flash={flash}/>
              </div>
              <div style={{textAlign:"center",marginTop:24}}>
                <button style={{background:"none",border:"none",color:"rgba(240,234,214,.1)",fontSize:10,cursor:"pointer",fontFamily:"Georgia,serif",letterSpacing:1}} onClick={()=>setView("admin")}>admin</button>
              </div>
            </>}

            {view==="tally"&&<>
              <div style={C.weekRow}>
                <div style={{...C.dayTag, textAlign:"center"}}>
                  <div>SAT · {sat}</div>
                  {weather&&<div style={{fontSize:11,color:"rgba(240,234,214,.6)",marginTop:3,letterSpacing:.5}}>{weather.sat.icon} {weather.sat.hi}° · {weather.sat.rain}%</div>}
                </div>
                <div style={{...C.dayTag, textAlign:"center"}}>
                  <div>SUN · {sun}</div>
                  {weather&&<div style={{fontSize:11,color:"rgba(240,234,214,.6)",marginTop:3,letterSpacing:.5}}>{weather.sun.icon} {weather.sun.hi}° · {weather.sun.rain}%</div>}
                </div>
              </div>
              <div style={C.tGrid}>
                {[{label:"Saturday",list:satIn},{label:"Sunday",list:sunIn}].map(({label,list})=>(
                  <div key={label} style={C.tBox}>
                    <div style={C.tH}>{label}</div>
                    <div style={C.tN}>{list.length}</div>
                    {list.length===0?<div style={{color:"rgba(240,234,214,.3)",fontSize:13,fontStyle:"italic"}}>None yet</div>:list.map(p=><div key={p} style={C.tItem}>✓ {p}</div>)}
                  </div>
                ))}
              </div>
              <div style={{marginTop:16,textAlign:"center"}}>
                <button onClick={()=>setShowPlaya(p=>!p)} style={{background:"rgba(212,175,55,.1)",border:"1px solid rgba(212,175,55,.35)",borderRadius:10,padding:"12px 24px",color:"#d4af37",fontFamily:"Georgia,serif",fontSize:14,letterSpacing:1,cursor:"pointer",width:"100%"}}>
                  🏌️ The Playa Club {showPlaya?"▲":"▼"}
                </button>
                {showPlaya&&<div style={{marginTop:12,background:"rgba(0,0,0,.3)",borderRadius:10,border:"1px solid rgba(212,175,55,.18)",padding:"16px 14px",textAlign:"left"}}>
                  <div style={{textAlign:"center",marginBottom:12}}>
                    <div style={{fontSize:11,color:"rgba(240,234,214,.35)",fontStyle:"italic",letterSpacing:.5}}>Another Excuse Like All the Others</div>
                  </div>
                  {Object.entries(allTimeRounds).length===0
                    ? <div style={{color:"rgba(240,234,214,.3)",fontSize:13,fontStyle:"italic",textAlign:"center"}}>No rounds logged yet</div>
                    : Object.entries(allTimeRounds)
                        .sort((a,b)=>b[1]-a[1])
                        .map(([name,rounds],i)=>(
                          <div key={name} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                            <div style={{width:24,fontSize:12,color:i===0?"#d4af37":i===1?"#c0c0c0":i===2?"#cd7f32":"rgba(240,234,214,.35)",fontWeight:"bold"}}>{i+1}</div>
                            <div style={{flex:1,fontSize:15}}>{name}</div>
                            <div style={{fontSize:14,color:"#d4af37",fontWeight:"bold"}}>{rounds} <span style={{fontSize:11,color:"rgba(240,234,214,.4)",fontWeight:"normal"}}>rounds</span></div>
                          </div>
                        ))
                  }
                </div>}
              </div>
            </>}

            {view==="groups"&&<>
              <div style={C.dSec}>
                <div style={C.dTitle}>⛳ Saturday · {sat} — {satIn.length} playing</div>
                {renderGroups(satGroups,"Saturday")}
              </div>
              <div style={C.dSec}>
                <div style={C.dTitle}>⛳ Sunday · {sun} — {sunIn.length} playing</div>
                {renderGroups(sunGroups,"Sunday")}
              </div>
            </>}

            {view==="photos"&&<PhotoWall wallPhotos={photos} wallKey="pics" uploaderVal={uploaderName} setUploaderVal={setUploaderName} captionVal={caption} setCaptionVal={setCaption} fileInputRef={fileRef} accent="#d4af37" multi={true}/>}

            {view==="bunker"&&<>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:28}}>⛺</div>
                <div style={{fontSize:16,color:"#7ec8a0",letterSpacing:2,textTransform:"uppercase",fontWeight:"bold"}}>Finelli's Bunker</div>
                <div style={{fontSize:11,color:"rgba(240,234,214,.4)",marginTop:4}}>The unofficial clubhouse</div>
              </div>
              <PhotoWall wallPhotos={bunkerPhotos} wallKey="bunker" uploaderVal={bunkerUploader} setUploaderVal={setBunkerUploader} captionVal={bunkerCaption} setCaptionVal={setBunkerCaption} fileInputRef={bunkerRef} accent="#7ec8a0" showTagline={false} multi={true}/>
            </>}

            {view==="ace"&&(!aceUnlocked?(
              <div style={C.lockBox}>
                <div style={{fontSize:40,marginBottom:12}}>🏆</div>
                <div style={{fontSize:16,color:"#d4af37",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Hole in One</div>
                <div style={{fontSize:13,color:"rgba(212,175,55,.6)",fontStyle:"italic",marginBottom:20}}>Only for those who have achieved the impossible</div>
                <input style={{...C.input,textAlign:"center",marginBottom:8}} type="password" placeholder="Password" value={acePwInput} onChange={e=>setAcePwInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAceLogin()}/>
                {acePwError&&<div style={{color:"#e05c5c",fontSize:13,marginBottom:8}}>Wrong password</div>}
                <button style={C.addBtn} onClick={handleAceLogin}>Enter</button>
              </div>
            ):<>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:28}}>🏆</div>
                <div style={{fontSize:16,color:"#d4af37",letterSpacing:2,textTransform:"uppercase",fontWeight:"bold"}}>Hole in One</div>
                <div style={{fontSize:11,color:"rgba(240,234,214,.4)",marginTop:4,fontStyle:"italic"}}>Only for those who have achieved the impossible</div>
              </div>
              <PhotoWall wallPhotos={acePhotos} wallKey="ace" uploaderVal={aceUploader} setUploaderVal={setAceUploader} captionVal={aceCaption} setCaptionVal={setAceCaption} fileInputRef={aceRef} accent="#d4af37"/>
            </>)}

            {view==="admin"&&(!adminUnlocked?<>
              <div style={C.label}>Admin Access</div>
              <input style={C.input} type="password" placeholder="Enter admin password" value={pwInput} onChange={e=>setPwInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}/>
              {pwError&&<div style={{color:"#e05c5c",fontSize:13,marginTop:8}}>Wrong password</div>}
              <button style={C.addBtn} onClick={handleAdminLogin}>Unlock</button>
            </>:<>
              <div style={C.label}>Roster</div>
              {players.map((p,i)=>(
                <div key={i} style={C.aRow}>
                  {editIdx===i?<>
                    <input style={{...C.input,flex:1,padding:"6px 10px",fontSize:14}} value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(i)} autoFocus/>
                    <button style={C.icon("#d4af37")} onClick={()=>saveEdit(i)}>✓</button>
                    <button style={C.icon()} onClick={()=>setEditIdx(null)}>✕</button>
                  </>:<>
                    <div style={{flex:1,fontSize:15}}>{p}</div>
                    <button style={C.icon("rgba(212,175,55,.7)")} onClick={()=>{setEditIdx(i);setEditName(p);}}>✎</button>
                    <button style={C.icon("#e05c5c")} onClick={()=>removePlayer(i)}>✕</button>
                  </>}
                </div>
              ))}
              <div style={C.label}>Add Player</div>
              <input style={C.input} placeholder="Full name" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()}/>
              <button style={C.addBtn} onClick={addPlayer}>+ Add to Roster</button>
              <div style={C.label}>Change Passwords</div>
              <input style={{...C.input,marginBottom:8}} type="text" placeholder={`New admin password (current: ${passwords.admin})`} value={newAdminPw} onChange={e=>setNewAdminPw(e.target.value)}/>
              <input style={{...C.input,marginBottom:8}} type="text" placeholder={`New Hole in One password (current: ${passwords.ace})`} value={newAcePw} onChange={e=>setNewAcePw(e.target.value)}/>
              <button style={C.addBtn} onClick={savePasswords}>Save Passwords</button>
              {pwSaved&&<div style={{color:"#7ec8a0",fontSize:13,marginTop:8,textAlign:"center"}}>{pwSaved}</div>}
              <div style={C.label}>Reset Week</div>
              <button style={{...C.addBtn,color:"#e05c5c",borderColor:"rgba(224,92,92,.35)"}} onClick={clearWeek}>Clear All Signups, Groups &amp; Photos</button>
            </>)}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
